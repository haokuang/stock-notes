services:
  server-dev:
    platform: linux/amd64
    build:
      context: .
      target: development
    # Taro 4.1.9 / @swc/core 1.3.96 / @tarojs/plugin-doctor 不发布 linux-arm64-gnu binding,
    # Docker Desktop on Apple Silicon 默认拉 arm64 镜像,容器内 pnpm 会跳过所有 platform binding。
    # 修复:
    #   1. 强制 platform: linux/amd64,让 pnpm 能解析到 linux-x64-gnu binding;
    #   2. 容器启动时把 host pnpm-lock.yaml 备份到 /tmp,然后 --no-frozen-lockfile 重新解析,
    #      补全当前架构的 native binding(@swc/core-linux-x64-gnu、@tarojs/binding-linux-x64-gnu 等);
    #   3. trap EXIT/INT/TERM/HUP 在容器退出时把原始 lockfile 还原回 bind mount,避免污染开发者工作区。
    #      关键:必须 `pnpm dev:server` 作为 shell 子进程启动(不 exec),原 shell 进程的 trap 表
    #      才能在 SIGTERM/SIGINT 等软退出场景下被触发,exec 替换 PID 1 后 trap 不可靠。
    #      已知限制:硬 kill(docker kill --signal=SIGKILL / docker rm -f)与宿主机断电场景
    #      trap 不会执行,host lockfile 不会被还原——这是 bind mount 模式下的根本约束,
    #      pnpm install --no-frozen-lockfile 的输出物理上只能落到 bind mount 路径。
    command:
      - sh
      - -c
      - |
        set -e
        cp pnpm-lock.yaml /tmp/pnpm-lock.yaml.host.bak
        trap 'cp /tmp/pnpm-lock.yaml.host.bak /app/pnpm-lock.yaml' EXIT INT TERM HUP
        pnpm install --no-frozen-lockfile
        pnpm dev:server
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - server_root_node_modules:/app/node_modules
      - server_workspace_node_modules:/app/server/node_modules
    init: true
    stop_grace_period: 15s

  web-dev:
    platform: linux/amd64
    build:
      context: .
      target: development
    command:
      - sh
      - -c
      - |
        set -e
        cp pnpm-lock.yaml /tmp/pnpm-lock.yaml.host.bak
        trap 'cp /tmp/pnpm-lock.yaml.host.bak /app/pnpm-lock.yaml' EXIT INT TERM HUP
        pnpm install --no-frozen-lockfile
        pnpm dev:web
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      H5_PROXY_TARGET: http://server-dev:3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - server-dev
    ports:
      - "5001:5001"
    volumes:
      - .:/app
      - web_root_node_modules:/app/node_modules
      - web_workspace_node_modules:/app/server/node_modules
    init: true
    stop_grace_period: 15s

volumes:
  server_root_node_modules:
  server_workspace_node_modules:
  web_root_node_modules:
  web_workspace_node_modules:
