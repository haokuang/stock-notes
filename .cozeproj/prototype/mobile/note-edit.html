<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（电感紫，2026 标志色） === */
      --color-primary:              #6D4DFF;
      --color-primary-container:    #ECE7FF;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面（极浅冷灰 + 中性灰蓝色阶） === */
      --color-background:                 #EEF0F6;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #F8F9FD;
      --color-surface-container:          #E6E8F0;
      --color-surface-container-high:     #D9DCE6;
      --color-surface-container-highest:  #CCD0DC;
      /* === 文字 === */
      --color-on-surface:           #161826;
      --color-on-surface-variant:   #5B5E72;
      /* === 功能色（看多绿 / 看空红 / 中性琥珀，浅色下加深饱和度以提升对比） === */
      --color-success:  #0F8C66;
      --color-error:    #D11A4A;
      --color-warning:  #B45309;
      /* === 边框 === */
      --color-outline:          #C0C2CF;
      --color-outline-variant:  #DDDFE9;
      /* === 圆角 === */
      --radius-sm:   0.5rem;
      --radius-md:   0.75rem;
      --radius-lg:   1rem;
      --radius-xl:   1.25rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影（柔和实阴影，浅色下替代深色辉光） === */
      --shadow-card:   0 1px 2px rgba(20, 18, 60, 0.06), 0 6px 20px rgba(20, 18, 60, 0.10);
      --shadow-float:  0 4px 12px rgba(20, 18, 60, 0.10), 0 12px 40px rgba(20, 18, 60, 0.14);
      --shadow-dialog: 0 25px 60px rgba(20, 18, 60, 0.20), 0 0 1px rgba(20, 18, 60, 0.08);
      /* === 字体 === */
      --font-sans: "Space Grotesk", "Noto Sans SC", system-ui, sans-serif;
      --font-display: "Space Grotesk", "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: "Space Grotesk", "Noto Sans SC", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(109, 77, 255, 0.12), transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(16, 185, 129, 0.06), transparent 50%),
        #EEF0F6;
    }
    /* 玻璃拟态基础类（浅色版：白色半透明 + 强 backdrop-blur） */
    .glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 1px 2px rgba(20, 18, 60, 0.04), 0 6px 24px rgba(20, 18, 60, 0.06);
    }
    .glass-strong {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(32px) saturate(200%);
      -webkit-backdrop-filter: blur(32px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 16px rgba(20, 18, 60, 0.06);
    }
    /* 浅色辉光（用柔和阴影 + 描边替代发光，保留"主色"识别） */
    .glow-primary { box-shadow: 0 0 0 1px rgba(109, 77, 255, 0.30), 0 8px 24px rgba(109, 77, 255, 0.18); }
    .glow-success { box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.30), 0 6px 18px rgba(16, 185, 129, 0.14); }
    .glow-error   { box-shadow: 0 0 0 1px rgba(225, 29, 72, 0.30), 0 6px 18px rgba(225, 29, 72, 0.14); }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .tabular-nums { font-variant-numeric: tabular-nums; }
    @keyframes float-glow {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(-4px); opacity: 1; }
    }
    .animate-float-glow { animation: float-glow 3s ease-in-out infinite; }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(109, 77, 255, 0.10), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
  </style>

  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23F0F0F5"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%235E6172" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 二级页 Header（带关闭按钮 + 保存文本按钮，无 TabBar） -->
  <header class="sticky top-0 z-40 bg-background h-14 flex items-center justify-between px-4">
    <button id="btn-close" class="w-10 h-10 flex items-center justify-center text-on-surface rounded-full
                                   hover:bg-surface-container active:bg-surface-container-high transition-colors"
            aria-label="关闭">
      <i data-lucide="x" class="w-5 h-5"></i>
    </button>
    <h1 class="text-base font-semibold text-on-surface">新建观点</h1>
    <button id="btn-header-save" class="px-3 h-10 text-primary text-sm font-semibold rounded-full
                                        hover:bg-primary/10 active:bg-primary/15 transition-colors">
      保存
    </button>
  </header>
  <!-- @nav:end -->

  <!-- @main-content:start -->
  <main class="flex-1 pb-[calc(5.5rem+env(safe-area-inset-bottom))]">

    <!-- 1) 股票选择卡 -->
    <section class="px-4 pt-3">
      <button id="btn-stock-select" type="button"
              class="glass w-full rounded-2xl border border-outline-variant/40 px-4 py-3.5
                     flex items-center gap-3 hover:bg-white/85 active:scale-[0.99] transition-all">
        <div class="w-10 h-10 rounded-[10px] bg-white border border-primary/25 flex items-center justify-center shrink-0">
          <span class="text-[18px] font-bold text-primary leading-none">宁</span>
        </div>
        <div class="flex-1 min-w-0 text-left">
          <p class="text-[15px] font-semibold text-on-surface leading-tight">宁德时代</p>
          <p class="text-[12px] text-on-surface-variant mt-0.5 tabular-nums">300750.SZ</p>
        </div>
        <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-on-surface-variant shrink-0"></i>
      </button>
    </section>

    <!-- 2) 方向三选一 -->
    <section class="px-4 pt-5">
      <div class="glass-strong rounded-full p-1 flex items-center border border-outline-variant/30">
        <button id="dir-bull" data-dir="bull" type="button"
                class="dir-option flex-1 flex items-center justify-center gap-1.5 h-10 rounded-full
                       bg-primary-container text-primary border border-primary/40
                       text-[14px] font-semibold transition-all">
          <span class="w-2 h-2 rounded-full bg-success"></span>
          看多
        </button>
        <button id="dir-bear" data-dir="bear" type="button"
                class="dir-option flex-1 flex items-center justify-center gap-1.5 h-10 rounded-full
                       text-on-surface-variant text-[14px] font-semibold transition-all">
          <span class="w-2 h-2 rounded-full bg-error"></span>
          看空
        </button>
        <button id="dir-neutral" data-dir="neutral" type="button"
                class="dir-option flex-1 flex items-center justify-center gap-1.5 h-10 rounded-full
                       text-on-surface-variant text-[14px] font-semibold transition-all">
          <span class="w-2 h-2 rounded-full bg-warning"></span>
          中性
        </button>
      </div>
    </section>

    <!-- 3) 价格三列输入 -->
    <section class="px-4 pt-5">
      <div class="grid grid-cols-3 gap-2.5">
        <div class="bg-surface-container rounded-xl px-4 py-3">
          <div class="flex items-center gap-1 text-on-surface-variant">
            <i data-lucide="log-in" class="w-3 h-3"></i>
            <span class="text-[12px]">入场</span>
          </div>
          <input id="price-entry" type="number" inputmode="decimal" value="195.20" step="0.01"
                 class="w-full bg-transparent border-none outline-none text-[17px] font-bold text-on-surface
                        placeholder:text-on-surface-variant/40 mt-1.5 tabular-nums p-0 focus:ring-0" />
        </div>
        <div class="bg-surface-container rounded-xl px-4 py-3">
          <div class="flex items-center gap-1 text-on-surface-variant">
            <i data-lucide="target" class="w-3 h-3"></i>
            <span class="text-[12px]">目标</span>
          </div>
          <input id="price-target" type="number" inputmode="decimal" value="285.00" step="0.01"
                 class="w-full bg-transparent border-none outline-none text-[17px] font-bold text-on-surface
                        placeholder:text-on-surface-variant/40 mt-1.5 tabular-nums p-0 focus:ring-0" />
        </div>
        <div class="bg-surface-container rounded-xl px-4 py-3">
          <div class="flex items-center gap-1 text-on-surface-variant">
            <i data-lucide="shield" class="w-3 h-3"></i>
            <span class="text-[12px]">止损</span>
          </div>
          <input id="price-stop" type="number" inputmode="decimal" value="175.00" step="0.01"
                 class="w-full bg-transparent border-none outline-none text-[17px] font-bold text-on-surface
                        placeholder:text-on-surface-variant/40 mt-1.5 tabular-nums p-0 focus:ring-0" />
        </div>
      </div>
    </section>

    <!-- 4) 标题输入 -->
    <section class="px-4 pt-5">
      <div class="relative">
        <input id="input-title" type="text" maxlength="100"
               value="Q3 业绩拐点 + 储能放量，看多宁王 50% 空间"
               class="w-full bg-surface-container border-none rounded-xl px-4 py-3 pr-16 text-base
                      text-on-surface placeholder:text-on-surface-variant/40
                      focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" />
        <span id="title-counter" class="absolute right-3 top-1/2 -translate-y-1/2 text-[11px] text-on-surface-variant tabular-nums">
          28/100
        </span>
      </div>
    </section>

    <!-- 5) 富文本正文编辑器 -->
    <section class="px-4 pt-5">
      <div class="glass bg-white/70 rounded-2xl border border-outline-variant/40 overflow-hidden">
        <!-- 工具栏 -->
        <div class="flex items-center gap-1 px-2 py-2 border-b border-outline-variant/30 overflow-x-auto scrollbar-hide">
          <button id="rt-bold" type="button" aria-label="加粗"
                  class="rt-tool shrink-0 w-9 h-9 flex items-center justify-center text-on-surface-variant
                          rounded-lg hover:bg-surface-container active:bg-surface-container-high transition-colors">
            <i data-lucide="bold" class="w-4 h-4"></i>
          </button>
          <button id="rt-italic" type="button" aria-label="斜体"
                  class="rt-tool shrink-0 w-9 h-9 flex items-center justify-center text-on-surface-variant
                          rounded-lg hover:bg-surface-container active:bg-surface-container-high transition-colors">
            <i data-lucide="italic" class="w-4 h-4"></i>
          </button>
          <button id="rt-underline" type="button" aria-label="下划线"
                  class="rt-tool shrink-0 w-9 h-9 flex items-center justify-center text-on-surface-variant
                          rounded-lg hover:bg-surface-container active:bg-surface-container-high transition-colors">
            <i data-lucide="underline" class="w-4 h-4"></i>
          </button>
          <span class="shrink-0 w-px h-5 bg-outline-variant/40 mx-1"></span>
          <button id="rt-list" type="button" aria-label="无序列表"
                  class="rt-tool shrink-0 w-9 h-9 flex items-center justify-center text-on-surface-variant
                          rounded-lg hover:bg-surface-container active:bg-surface-container-high transition-colors">
            <i data-lucide="list" class="w-4 h-4"></i>
          </button>
          <button id="rt-list-ol" type="button" aria-label="有序列表"
                  class="rt-tool shrink-0 w-9 h-9 flex items-center justify-center text-on-surface-variant
                          rounded-lg hover:bg-surface-container active:bg-surface-container-high transition-colors">
            <i data-lucide="list-ordered" class="w-4 h-4"></i>
          </button>
          <button id="rt-quote" type="button" aria-label="引用"
                  class="rt-tool shrink-0 w-9 h-9 flex items-center justify-center text-on-surface-variant
                          rounded-lg hover:bg-surface-container active:bg-surface-container-high transition-colors">
            <i data-lucide="quote" class="w-4 h-4"></i>
          </button>
          <span class="shrink-0 w-px h-5 bg-outline-variant/40 mx-1"></span>
          <button id="rt-link" type="button" aria-label="链接"
                  class="rt-tool shrink-0 w-9 h-9 flex items-center justify-center text-on-surface-variant
                          rounded-lg hover:bg-surface-container active:bg-surface-container-high transition-colors">
            <i data-lucide="link" class="w-4 h-4"></i>
          </button>
          <button id="rt-image" type="button" aria-label="插入图片"
                  class="rt-tool shrink-0 w-9 h-9 flex items-center justify-center text-on-surface-variant
                          rounded-lg hover:bg-surface-container active:bg-surface-container-high transition-colors">
            <i data-lucide="image" class="w-4 h-4"></i>
          </button>
        </div>
        <!-- 正文区 -->
        <textarea id="rt-content" rows="10"
                  class="w-full bg-transparent border-none outline-none px-4 py-3.5 text-[15px] leading-relaxed
                         text-on-surface placeholder:text-on-surface-variant/40 resize-none
                         focus:ring-0 min-h-48"
                  placeholder="详细记录你的投资逻辑……支持粘贴图片，自动调用 AI 解读">1. 行业逻辑：新能源车渗透率突破 50%，行业从导入期进入成长期主升浪。
2. 业绩拐点：Q2 装机量同比 +45%，毛利率回升至 28%，单瓦时盈利超预期。
3. 估值水平：当前 PE 18x 处于历史 30% 分位，海外储能订单贡献第二增长曲线。
4. 风险提示：上游碳酸锂价格反弹 + 海外贸易政策不确定性。</textarea>
      </div>
    </section>

    <!-- 6) 图片附件区 -->
    <section class="px-4 pt-5">
      <div class="flex items-center justify-between mb-2.5">
        <h2 class="text-sm font-semibold text-on-surface">附件</h2>
        <span class="text-xs text-on-surface-variant tabular-nums">3/9</span>
      </div>
      <div class="flex gap-2.5 overflow-x-auto scrollbar-hide pb-1">
        <!-- 缩略图-1：已上传 + AI 解读 -->
        <div class="relative shrink-0 group" data-img-id="img-1">
          <img id="thumb-1" src="https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=200&h=200&fit=crop"
               alt="宁德时代K线图" data-category="商业科技"
               class="w-24 h-24 rounded-xl object-cover border border-outline-variant/30 bg-surface-container" />
          <span class="absolute top-1 left-1 px-1.5 py-0.5 rounded-md bg-primary/95 text-on-primary text-[9px] font-bold tracking-wide">AI</span>
          <button id="btn-del-1" type="button" aria-label="删除附件"

                          flex items-center justify-center hover:bg-error active:scale-90 transition-all">
            <i data-lucide="x" class="w-3 h-3"></i>
          </button>
        </div>
        <!-- 缩略图-2：已上传 + AI 解读 -->
        <div class="relative shrink-0 group" data-img-id="img-2">
          <img id="thumb-2" src="https://images.unsplash.com/photo-1640340434855-6084b1f4901c?w=200&h=200&fit=crop"
               alt="装机量数据图表" data-category="商业科技"
               class="w-24 h-24 rounded-xl object-cover border border-outline-variant/30 bg-surface-container" />
          <span class="absolute top-1 left-1 px-1.5 py-0.5 rounded-md bg-primary/95 text-on-primary text-[9px] font-bold tracking-wide">AI</span>
          <button id="btn-del-2" type="button" aria-label="删除附件"
                  class="absolute top-1 right-1 w-5 h-5 rounded-full bg-black/60 backdrop-blur text-white
                          flex items-center justify-center hover:bg-error active:scale-90 transition-all">
            <i data-lucide="x" class="w-3 h-3"></i>
          </button>
        </div>
        <!-- 缩略图-3：已上传 + AI 解读 -->
        <div class="relative shrink-0 group" data-img-id="img-3">
          <img id="thumb-3" src="https://images.unsplash.com/photo-1559526324-4b87b5e36e44?w=200&h=200&fit=crop"

               class="w-24 h-24 rounded-xl object-cover border border-outline-variant/30 bg-surface-container" />
          <span class="absolute top-1 left-1 px-1.5 py-0.5 rounded-md bg-primary/95 text-on-primary text-[9px] font-bold tracking-wide">AI</span>
          <button id="btn-del-3" type="button" aria-label="删除附件"

                          flex items-center justify-center hover:bg-error active:scale-90 transition-all">
            <i data-lucide="x" class="w-3 h-3"></i>
          </button>
        </div>
        <!-- 上传占位卡 -->
        <button id="btn-upload" type="button"

                       flex flex-col items-center justify-center gap-1 text-on-surface-variant

          <i data-lucide="plus" class="w-6 h-6"></i>
          <span class="text-[10px] font-medium">上传截图</span>
        </button>
      </div>
    </section>

    <!-- 7) AI 解读提示条 -->
    <section class="px-4 pt-5">
      <div id="ai-insert-banner"
           class="glass bg-white/80 rounded-2xl border border-primary/25 px-3.5 py-3 flex items-center gap-3">
        <i data-lucide="sparkles" class="w-[18px] h-[18px] text-primary shrink-0"></i>

    <!-- 8) 标签与关联事件 -->
    <section class="px-4 pt-6">
      <h2 class="text-sm font-semibold text-on-surface mb-2.5">标签</h2>
      <div class="flex flex-wrap gap-2">
        <span id="tag-new-energy" class="tag-chip inline-flex items-center gap-1 px-3 py-1.5 rounded-full

        </span>
        <span id="tag-ev-demand" class="tag-chip inline-flex items-center gap-1 px-3 py-1.5 rounded-full

        </span>

    <div class="absolute bottom-0 left-0 right-0 glass-strong rounded-t-2xl border-t border-outline-variant/40

                class="flex items-center gap-3 px-3 py-3.5 rounded-xl hover:bg-surface-container active:bg-surface-container-high transition-colors text-left">

                class="flex items-center gap-3 px-3 py-3.5 rounded-xl hover:bg-surface-container active:bg-surface-container-high transition-colors text-left">

                class="flex items-center gap-3 px-3 py-3.5 rounded-xl hover:bg-error/10 active:bg-error/15 transition-colors text-left">

  <script>
    $(function() {
        // === 导航辅助函数 ===
        function navPush(route) { window.location.href = route; }
        function navReplace(route) { window.location.replace(route); }
        function navReset(route) { window.location.href = route; }
        function navBack() {
            if (window.history.length > 1) window.history.back();
            else window.location.href = 'stock.html';
        }

        // === 关闭按钮：返回 stock.html ===
        $('#btn-close').on('click', function() {
            navBack();
        });

        // === 标题输入：字符计数 ===
        $('#input-title').on('input', function() {
            const len = $(this).val().length;
            $('#title-counter').text(len + '/100');
        });

        // === 方向三选一：切换激活态 ===
        $('.dir-option').on('click', function() {
            const $self = $(this);
            // 移除所有激活态
            $('.dir-option').removeClass('bg-primary-container text-primary border border-primary/40')
                              .addClass('text-on-surface-variant')
                              .removeAttr('aria-current');
            // 设置当前激活
            $self.addClass('bg-primary-container text-primary border border-primary/40')
                 .removeClass('text-on-surface-variant')
                 .attr('aria-current', 'true');
        });

        // === 富文本工具栏（原型只绑定事件入口） ===
        // 后续应实现：
        // 1. bold/italic/underline：在选区包裹对应 markdown 标记（** / * / __）
        // 2. list/list-ordered：在行首插入 - / 1. 标记
        // 3. quote：在行首插入 > 标记
        // 4. link：弹出 URL 输入框，选中文本包裹 [text](url)
        // 5. image：弹出图片选择/上传，插入 ![alt](url)
        $('.rt-tool').on('click', function() {
            const tool = this.id.replace('rt-', '');
            console.log('[富文本] 工具栏操作:', tool, '- 实际实现需在选区插入对应 markdown 标记');
        });

        // === 股票选择：打开 sheet ===
        $('#btn-stock-select').on('click', function() {
            $('#sheet-stock').removeClass('hidden');
        });
        // 关闭 stock sheet
        function closeStockSheet() { $('#sheet-stock').addClass('hidden'); }
        $('#btn-sheet-stock-close, #sheet-stock-mask').on('click', closeStockSheet);

        // 选择股票
        $('.stock-item').on('click', function() {
            const code = $(this).data('code');
            const name = $(this).data('name');
            const first = name.substring(0, 1);
            // 更新顶部卡（视觉态）
            $('#btn-stock-select .text-\\[15px\\]').text(name);
            $('#btn-stock-select .text-\\[12px\\]').text(code + '.SZ · 我的自选');
            $('#btn-stock-select .text-\\[18px\\]').text(first);
            closeStockSheet();
        });

        // === 图片缩略图：点击弹出操作 sheet ===
        $('[data-img-id]').on('click', function(e) {
            // 阻止 × 删除按钮冒泡
            if ($(e.target).closest('button').length) return;
            const id = $(this).data('img-id');
            console.log('[图片] 点击缩略图:', id);
            $('#sheet-image-title').text('图片操作');
            $('#sheet-image').removeClass('hidden');
        });
        // 单张 × 删除按钮
        $('[id^="btn-del-"]').on('click', function(e) {
            e.stopPropagation();
            const id = $(this).attr('id').replace('btn-del-', '');
            console.log('[图片] 删除图片:', id);
            // 原型仅日志；后续应：确认 → 调 upload/delete → 从 DOM 移除
            $(this).closest('[data-img-id]').fadeOut(200, function() { $(this).remove(); });
        });
        // 关闭 image sheet
        function closeImageSheet() { $('#sheet-image').addClass('hidden'); }
        $('#btn-sheet-image-close, #sheet-image-mask').on('click', closeImageSheet);
        $('#img-action-view').on('click', function() { console.log('[图片] 查看大图'); closeImageSheet(); });
        $('#img-action-ai').on('click', function() { console.log('[图片] AI 重新解读'); closeImageSheet(); });
        $('#img-action-del').on('click', function() { console.log('[图片] 删除图片'); closeImageSheet(); });

        // === 上传占位卡 ===
        $('#btn-upload, #btn-bottom-image').on('click', function() {
            console.log('[上传] 弹出系统选择图片：相册/拍照/粘贴');
            // 后续应：调起 Network.chooseImage → 上传 TOS → 调 ai/image-understand
        });

        // === 语音输入 ===
        $('#btn-bottom-mic').on('click', function() {
            console.log('[语音] 开始录音：长按说话，识别为文字追加到正文');
            // 后续应：按住录音 → 实时识别 → 追加到 #rt-content 末尾
        });

        // === AI 解读插入 ===
        $('#btn-ai-insert').on('click', function() {
            const $rt = $('#rt-content');
            const insertText = '\n\n【AI 解读】\n• 图1（K线图）：5日均线金叉10日，MACD 红柱放大，短期动能向上。\n• 图2（装机量）：6月装机 32.5 GWh 创历史新高，YoY +45%。\n• 图3（研报截图）：中信证券 7/15 给予「买入」评级，目标价 285 元。';
            $rt.val(($rt.val() || '') + insertText);
            // 隐藏提示条
            $('#ai-insert-banner').fadeOut(200, function() { $(this).remove(); });
            console.log('[AI] 已将 3 张图解读插入正文末尾');
        });

        // === 标签管理 ===
        $('.tag-chip').on('click', function() {
            const tag = $(this).text().trim();
            console.log('[标签] 移除标签:', tag);
            // 后续应：调 notes/remove-tag → 动画移除
            $(this).fadeOut(150, function() { $(this).remove(); });
        });
        $('#btn-add-tag').on('click', function() {
            console.log('[标签] 弹出标签选择器：搜索已有标签 / 新建标签');
            // 后续应：弹出 tag-picker sheet
        });

        // === 保存按钮 ===
        function saveNote() {
            const payload = {
                code: '300750.SZ',
                name: '宁德时代',
                direction: $('.dir-option[aria-current="true"]').data('dir') || 'bull',
                price_entry: $('#price-entry').val(),
                price_target: $('#price-target').val(),
                price_stop: $('#price-stop').val(),
                title: $('#input-title').val(),
                content: $('#rt-content').val(),
                event: $('#input-event').val(),
                source: $('#input-source').val(),
                tags: ['新能源', '车端需求', 'Q3 业绩']
            };
            console.log('[保存] 提交观点:', payload);
            // 后续应：调 notes/create 或 notes/update，成功后 navBack
            alert('已保存观点（演示）');
        }
        $('#btn-header-save, #btn-save').on('click', saveNote);
    });
  </script>
