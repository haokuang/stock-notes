<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（电感紫，2026 标志色） === */
      --color-primary:              #7C5CFF;
      --color-primary-container:    #2A1B5C;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面（极暗蓝黑 + 中性灰蓝色阶） === */
      --color-background:                 #0A0B14;
      --color-surface-container-lowest:   #0F1119;
      --color-surface:                    #14171F;
      --color-surface-container:          #1A1D27;
      --color-surface-container-high:     #22252F;
      --color-surface-container-highest:  #2A2D38;
      /* === 文字 === */
      --color-on-surface:           #F5F6FA;
      --color-on-surface-variant:   #9CA0B0;
      /* === 功能色（看多绿 / 看空红 / 中性琥珀） === */
      --color-success:  #22E58D;
      --color-error:    #FF4D6D;
      --color-warning:  #FFB547;
      /* === 边框 === */
      --color-outline:          #3A3E4D;
      --color-outline-variant:  #252835;
      /* === 圆角 === */
      --radius-sm:   0.5rem;
      --radius-md:   0.75rem;
      --radius-lg:   1rem;
      --radius-xl:   1.25rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影（带霓虹辉光） === */
      --shadow-card:   0 4px 24px rgba(124, 92, 255, 0.10), 0 1px 2px rgba(0,0,0,0.4);
      --shadow-float:  0 10px 40px rgba(124, 92, 255, 0.18), 0 4px 12px rgba(0,0,0,0.5);
      --shadow-dialog: 0 25px 60px rgba(0,0,0,0.6), 0 0 60px rgba(124, 92, 255, 0.12);
      /* === 字体 === */
      --font-sans: "Space Grotesk", "Noto Sans SC", system-ui, sans-serif;
      --font-display: "Space Grotesk", "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: "Space Grotesk", "Noto Sans SC", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124, 92, 255, 0.18), transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(34, 229, 141, 0.06), transparent 50%),
        #0A0B14;
    }
    .glass {
      background: rgba(20, 23, 31, 0.55);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .glass-strong {
      background: rgba(15, 17, 25, 0.78);
      backdrop-filter: blur(32px) saturate(200%);
      -webkit-backdrop-filter: blur(32px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glow-primary { box-shadow: 0 0 24px rgba(124, 92, 255, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.1); }
    .glow-success { box-shadow: 0 0 18px rgba(34, 229, 141, 0.30); }
    .glow-error   { box-shadow: 0 0 18px rgba(255, 77, 109, 0.30); }
    .glow-warning { box-shadow: 0 0 16px rgba(255, 181, 71, 0.25); }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .tabular-nums { font-variant-numeric: tabular-nums; }
    .ring-focus:focus-within { box-shadow: 0 0 0 2px rgba(124, 92, 255, 0.3); }
    .gradient-border {
      position: relative;
      background: linear-gradient(135deg, rgba(124,92,255,0.55), rgba(34,229,141,0.35) 50%, rgba(124,92,255,0.55));
      padding: 1px;
      border-radius: 1rem;
    }
    .gradient-border > .gradient-inner {
      background: rgba(26, 29, 39, 0.85);
      border-radius: calc(1rem - 1px);
    }
    @keyframes float-glow {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(-4px); opacity: 1; }
    }
    .animate-float-glow { animation: float-glow 3s ease-in-out infinite; }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    .rt-tool.active { background-color: rgba(124, 92, 255, 0.18); color: #7C5CFF; }
  </style>

  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%231A1D27"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239CA0B0" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- 二级页 Header（替换骨架的 TabBar 段） -->
  <header class="sticky top-0 z-40 h-14 flex items-center justify-between px-4 bg-background">
    <button id="btn-close"
            class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full
                   hover:bg-surface-container active:bg-surface-container-high transition-colors"
            aria-label="关闭">
      <i data-lucide="x" class="w-5 h-5"></i>
    </button>
    <h1 class="text-base font-semibold text-on-surface">新建观点</h1>
    <button id="btn-header-save"
            class="text-primary font-semibold text-sm px-2 py-2 active:opacity-70 transition-opacity">
      保存
    </button>
  </header>

  <!-- @main-content:start -->
  <main class="flex-1 pb-[calc(5.5rem+env(safe-area-inset-bottom))]">
    <div class="px-4 pt-4 space-y-5">

      <!-- 1) 股票选择卡（玻璃容器） -->
      <div id="stock-card"
           class="glass rounded-2xl p-4 flex items-center gap-3 active:scale-[0.99] transition-transform cursor-pointer">
        <div class="w-10 h-10 rounded-[10px] glass flex items-center justify-center flex-shrink-0">
          <span class="text-lg font-bold text-primary">宁</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-[15px] font-semibold text-on-surface leading-tight">宁德时代</p>
          <p class="text-xs text-on-surface-variant mt-0.5">300750.SZ · 创业板</p>
        </div>
        <i data-lucide="chevron-down" class="w-3 h-3 text-on-surface-variant flex-shrink-0"></i>
      </div>

      <!-- 2) 方向三选一（Segmented Control） -->
      <div class="glass rounded-full p-1 flex">
        <!-- 看多（默认激活） -->
        <button id="dir-bull" data-dir="bull" aria-pressed="true"
                class="dir-btn flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full
                       bg-primary-container/60 transition-all">
          <span class="w-2 h-2 rounded-full bg-success glow-success"></span>
          <span class="text-sm font-semibold text-primary">看多</span>
        </button>
        <!-- 看空 -->
        <button id="dir-bear" data-dir="bear" aria-pressed="false"
                class="dir-btn flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full
                       transition-all">
          <span class="w-2 h-2 rounded-full bg-error"></span>
          <span class="text-sm font-semibold text-on-surface-variant">看空</span>
        </button>
        <!-- 中性 -->
        <button id="dir-neutral" data-dir="neutral" aria-pressed="false"
                class="dir-btn flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full
                       transition-all">
          <span class="w-2 h-2 rounded-full bg-warning"></span>
          <span class="text-sm font-semibold text-on-surface-variant">中性</span>
        </button>
      </div>

      <!-- 3) 价格三列输入 -->
      <div class="grid grid-cols-3 gap-3">
        <!-- 入场价 -->
        <div class="bg-surface-container rounded-xl px-4 py-3 ring-focus transition-shadow">
          <div class="flex items-center gap-1.5 mb-1.5">
            <i data-lucide="log-in" class="w-3 h-3 text-success"></i>
            <span class="text-xs text-on-surface-variant">入场</span>
          </div>
          <input id="input-entry" type="text" inputmode="decimal" value="195.20"
                 class="w-full bg-transparent border-none p-0 text-[17px] font-bold text-on-surface
                        tabular-nums focus:outline-none placeholder:text-on-surface-variant/30" />
        </div>
        <!-- 目标价 -->
        <div class="bg-surface-container rounded-xl px-4 py-3 ring-focus transition-shadow">
          <div class="flex items-center gap-1.5 mb-1.5">
            <i data-lucide="target" class="w-3 h-3 text-primary"></i>
            <span class="text-xs text-on-surface-variant">目标</span>
          </div>
          <input id="input-target" type="text" inputmode="decimal" value="285.00"
                 class="w-full bg-transparent border-none p-0 text-[17px] font-bold text-on-surface
                        tabular-nums focus:outline-none placeholder:text-on-surface-variant/30" />
        </div>
        <!-- 止损价 -->
        <div class="bg-surface-container rounded-xl px-4 py-3 ring-focus transition-shadow">
          <div class="flex items-center gap-1.5 mb-1.5">
            <i data-lucide="shield" class="w-3 h-3 text-error"></i>
            <span class="text-xs text-on-surface-variant">止损</span>
          </div>
          <input id="input-stop" type="text" inputmode="decimal" value="175.00"
                 class="w-full bg-transparent border-none p-0 text-[17px] font-bold text-on-surface
                        tabular-nums focus:outline-none placeholder:text-on-surface-variant/30" />
        </div>
      </div>

      <!-- 4) 标题输入 -->
      <div class="relative bg-surface-container rounded-xl px-4 py-3 ring-focus transition-shadow">
        <input id="input-title" type="text" maxlength="100"
               placeholder="取个简洁有力的标题"
               class="w-full bg-transparent border-none p-0 pr-14 text-base text-on-surface
                      placeholder:text-on-surface-variant/30 focus:outline-none" />
        <span id="title-counter"
              class="absolute right-4 top-3 text-[11px] text-on-surface-variant pointer-events-none tabular-nums">28/100</span>
      </div>

      <!-- 5) 富文本正文编辑器 -->
      <div class="glass rounded-2xl overflow-hidden">
        <!-- 工具栏 -->
        <div class="flex items-center gap-1 px-2 py-2 border-b border-outline-variant/10 overflow-x-auto scrollbar-hide">
          <button id="rt-bold" class="rt-tool p-2 rounded-lg hover:bg-surface-container transition-colors" aria-label="加粗">
            <i data-lucide="bold" class="w-4 h-4 text-on-surface-variant"></i>
          </button>
          <button id="rt-italic" class="rt-tool p-2 rounded-lg hover:bg-surface-container transition-colors" aria-label="斜体">
            <i data-lucide="italic" class="w-4 h-4 text-on-surface-variant"></i>
          </button>
          <button id="rt-underline" class="rt-tool p-2 rounded-lg hover:bg-surface-container transition-colors" aria-label="下划线">
            <i data-lucide="underline" class="w-4 h-4 text-on-surface-variant"></i>
          </button>
          <span class="w-px h-5 bg-outline-variant/20 mx-1"></span>
          <button id="rt-list" class="rt-tool p-2 rounded-lg hover:bg-surface-container transition-colors" aria-label="无序列表">
            <i data-lucide="list" class="w-4 h-4 text-on-surface-variant"></i>
          </button>
          <button id="rt-list-ordered" class="rt-tool p-2 rounded-lg hover:bg-surface-container transition-colors" aria-label="有序列表">
            <i data-lucide="list-ordered" class="w-4 h-4 text-on-surface-variant"></i>
          </button>
          <button id="rt-quote" class="rt-tool p-2 rounded-lg hover:bg-surface-container transition-colors" aria-label="引用">
            <i data-lucide="quote" class="w-4 h-4 text-on-surface-variant"></i>
          </button>
          <span class="w-px h-5 bg-outline-variant/20 mx-1"></span>
          <button id="rt-link" class="rt-tool p-2 rounded-lg hover:bg-surface-container transition-colors" aria-label="插入链接">
            <i data-lucide="link" class="w-4 h-4 text-on-surface-variant"></i>
          </button>
          <button id="rt-image" class="rt-tool p-2 rounded-lg hover:bg-surface-container transition-colors" aria-label="插入图片">
            <i data-lucide="image" class="w-4 h-4 text-on-surface-variant"></i>
          </button>
        </div>
        <!-- 正文区 -->
        <textarea id="input-content" rows="8"
                  placeholder="详细记录你的投资逻辑……支持粘贴图片，自动调用 AI 解读"
                  class="w-full bg-transparent border-none p-4 text-sm text-on-surface leading-relaxed
                         placeholder:text-on-surface-variant/30 focus:outline-none resize-none min-h-48">1. 行业逻辑：新能源车渗透率突破 50%，电池需求年化 25%+

2. 业绩拐点：Q2 装机量同比 +45%，单位毛利回升至 0.18 元/Wh

3. 估值水平：当前 PE 18x 处于历史 30% 分位，海外储能订单超预期</textarea>
      </div>

      <!-- 6) 图片附件区 -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-semibold text-on-surface">附件</h3>
          <span class="text-xs text-on-surface-variant tabular-nums">3/9</span>
        </div>
        <div class="flex gap-3 overflow-x-auto scrollbar-hide pb-1 -mx-4 px-4">
          <!-- 附件-图1：宁德 K 线图 -->
          <div class="attachment-item relative w-24 h-24 rounded-xl overflow-hidden flex-shrink-0 active:scale-95 transition-transform"
               data-id="att-1" data-name="宁德时代周K线图">
            <img src="https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=400&h=400&fit=crop"
                 alt="宁德时代 K 线图" data-category="商业科技"
                 class="w-full h-full object-cover" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent"></div>
            <button class="att-remove absolute top-1 right-1 w-5 h-5 bg-black/60 backdrop-blur-sm rounded-full flex items-center justify-center">
              <i data-lucide="x" class="w-3 h-3 text-white"></i>
            </button>
            <div class="absolute bottom-1 left-1 px-1.5 py-0.5 bg-primary/85 backdrop-blur-sm rounded text-[10px] font-bold text-on-primary tracking-wide">AI</div>
          </div>
          <!-- 附件-图2：装机量柱状图 -->
          <div class="attachment-item relative w-24 h-24 rounded-xl overflow-hidden flex-shrink-0 active:scale-95 transition-transform"
               data-id="att-2" data-name="Q2 装机量柱状图">
            <img src="https://images.unsplash.com/photo-1543286386-713bdd548da4?w=400&h=400&fit=crop"
                 alt="Q2 装机量柱状图" data-category="商业科技"
                 class="w-full h-full object-cover" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent"></div>
            <button class="att-remove absolute top-1 right-1 w-5 h-5 bg-black/60 backdrop-blur-sm rounded-full flex items-center justify-center">
              <i data-lucide="x" class="w-3 h-3 text-white"></i>
            </button>
            <div class="absolute bottom-1 left-1 px-1.5 py-0.5 bg-primary/85 backdrop-blur-sm rounded text-[10px] font-bold text-on-primary tracking-wide">AI</div>
          </div>
          <!-- 附件-图3：海外订单截图 -->
          <div class="attachment-item relative w-24 h-24 rounded-xl overflow-hidden flex-shrink-0 active:scale-95 transition-transform"
               data-id="att-3" data-name="海外储能订单截图">
            <img src="https://images.unsplash.com/photo-1535320903710-d993d3d77d29?w=400&h=400&fit=crop"
                 alt="海外储能订单截图" data-category="商业科技"
                 class="w-full h-full object-cover" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent"></div>
            <button class="att-remove absolute top-1 right-1 w-5 h-5 bg-black/60 backdrop-blur-sm rounded-full flex items-center justify-center">
              <i data-lucide="x" class="w-3 h-3 text-white"></i>
            </button>
            <div class="absolute bottom-1 left-1 px-1.5 py-0.5 bg-primary/85 backdrop-blur-sm rounded text-[10px] font-bold text-on-primary tracking-wide">AI</div>
          </div>
          <!-- 上传占位卡 -->
          <button id="btn-add-image"
                  class="w-24 h-24 rounded-xl border border-dashed border-surface-container-high
                         flex flex-col items-center justify-center gap-1 flex-shrink-0
                         active:scale-95 transition-transform hover:border-primary/40">
            <i data-lucide="plus" class="w-6 h-6 text-on-surface-variant"></i>
            <span class="text-[10px] text-on-surface-variant">上传截图</span>
          </button>
        </div>
      </div>

      <!-- 7) AI 解读提示条（渐变描边玻璃卡） -->
      <div class="gradient-border">
        <div class="gradient-inner p-3.5 flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-primary/15 flex items-center justify-center flex-shrink-0">
            <i data-lucide="sparkles" class="w-[18px] h-[18px] text-primary"></i>
          </div>
          <p class="flex-1 text-[13px] text-on-surface leading-snug">
            已为 <span class="font-semibold text-primary">3</span> 张图生成 AI 解读，合并到正文末尾？
          </p>
          <button id="btn-ai-insert"
                  class="text-primary text-xs font-semibold px-3 py-1.5 rounded-full
                         bg-primary/15 hover:bg-primary/25 active:scale-95 transition-all">
            插入
          </button>
        </div>
      </div>

      <!-- 8) 标签 + 关联事件 -->
      <div class="space-y-4">
        <div>
          <div class="flex items-center justify-between mb-2.5">
            <p class="text-xs text-on-surface-variant">标签</p>
            <span class="text-[11px] text-on-surface-variant tabular-nums">3/5</span>
          </div>
          <div class="flex flex-wrap gap-2">
            <span class="tag-selected px-3 py-1.5 rounded-full border border-primary/60 bg-primary/10 text-primary text-xs font-medium inline-flex items-center gap-1">
              新能源
              <i data-lucide="x" class="w-3 h-3 opacity-60"></i>
            </span>
            <span class="tag-selected px-3 py-1.5 rounded-full border border-primary/60 bg-primary/10 text-primary text-xs font-medium inline-flex items-center gap-1">
              车端需求
              <i data-lucide="x" class="w-3 h-3 opacity-60"></i>
            </span>
            <span class="tag-selected px-3 py-1.5 rounded-full border border-primary/60 bg-primary/10 text-primary text-xs font-medium inline-flex items-center gap-1">
              Q3 业绩
              <i data-lucide="x" class="w-3 h-3 opacity-60"></i>
            </span>
            <button id="btn-add-tag"
                    class="px-3 py-1.5 rounded-full border border-dashed border-on-surface-variant/30
                           text-on-surface-variant text-xs inline-flex items-center gap-1
                           active:scale-95 transition-transform">
              <i data-lucide="plus" class="w-3 h-3"></i>
              添加标签
            </button>
          </div>
        </div>
        <div>
          <p class="text-xs text-on-surface-variant mb-1.5">关联事件</p>
          <input id="input-event" type="text"
                 placeholder="如：2024 Q2 财报发布"
                 class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-sm
                        text-on-surface placeholder:text-on-surface-variant/30
                        focus:outline-none focus:ring-2 focus:ring-primary/30 transition-shadow" />
        </div>
      </div>

      <!-- 9) 来源备注 -->
      <div>
        <p class="text-xs text-on-surface-variant mb-1.5">来源备注</p>
        <input id="input-source" type="text"
               placeholder="信息来源，如：招股书 / 行业研报 / 财报电话会"
               class="w-full bg-surface-container border-none rounded-xl px-4 py-3 text-sm
                      text-on-surface placeholder:text-on-surface-variant/30
                      focus:outline-none focus:ring-2 focus:ring-primary/30 transition-shadow" />
      </div>

      <!-- 底部说明 -->
      <div class="pt-2 pb-2 text-center">
        <p class="text-[11px] text-on-surface-variant/50 leading-relaxed">
          观点将保存至「宁德时代」时间线 · 仅自己可见
        </p>
      </div>

    </div>
  </main>
  <!-- @main-content:end -->

  <!-- 底部固定操作条（glass-strong） -->
  <div class="fixed bottom-0 left-0 right-0 z-30 glass-strong border-t border-outline-variant/10
              px-4 py-3 pb-[calc(0.75rem+env(safe-area-inset-bottom))]">
    <div class="flex items-center gap-3">
      <button id="btn-insert-image"
              class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center
                     active:scale-95 transition-transform"
              aria-label="插入图片">
        <i data-lucide="image" class="w-5 h-5 text-on-surface"></i>
      </button>
      <button id="btn-voice"
              class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center
                     active:scale-95 transition-transform"
              aria-label="语音速记">
        <i data-lucide="mic" class="w-5 h-5 text-on-surface"></i>
      </button>
      <button id="btn-save"
              class="flex-1 h-12 rounded-xl bg-primary text-on-primary text-[15px] font-semibold
                     glow-primary inline-flex items-center justify-center gap-2
                     active:scale-[0.98] transition-transform">
        <i data-lucide="check" class="w-4 h-4"></i>
        保存观点
      </button>
    </div>
  </div>

  <!-- Sheet：股票选择器 -->
  <div id="sheet-stock" class="hidden fixed inset-0 z-50">
    <div id="sheet-stock-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-surface rounded-t-2xl
                max-h-[80vh] overflow-y-auto
                px-6 pt-5 pb-[calc(1.5rem+env(safe-area-inset-bottom))]">
      <div class="w-10 h-1 bg-on-surface-variant/30 rounded-full mx-auto mb-4"></div>
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-base font-semibold text-on-surface">选择股票</h3>
        <button id="sheet-stock-close" class="w-8 h-8 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <div class="space-y-2">
        <button class="stock-option w-full flex items-center gap-3 p-3 rounded-xl bg-surface-container active:scale-[0.99] transition-transform" data-name="宁德时代" data-code="300750.SZ" data-initial="宁">
          <div class="w-10 h-10 rounded-[10px] glass flex items-center justify-center flex-shrink-0">
            <span class="text-lg font-bold text-primary">宁</span>
          </div>
          <div class="flex-1 text-left">
            <p class="text-sm font-semibold text-on-surface">宁德时代</p>
            <p class="text-xs text-on-surface-variant mt-0.5">300750.SZ · 新能源</p>
          </div>
          <i data-lucide="check" class="w-4 h-4 text-primary"></i>
        </button>
        <button class="stock-option w-full flex items-center gap-3 p-3 rounded-xl bg-surface-container active:scale-[0.99] transition-transform" data-name="比亚迪" data-code="002594.SZ" data-initial="比">
          <div class="w-10 h-10 rounded-[10px] glass flex items-center justify-center flex-shrink-0">
            <span class="text-lg font-bold text-primary">比</span>
          </div>
          <div class="flex-1 text-left">
            <p class="text-sm font-semibold text-on-surface">比亚迪</p>
            <p class="text-xs text-on-surface-variant mt-0.5">002594.SZ · 整车</p>
          </div>
        </button>
        <button class="stock-option w-full flex items-center gap-3 p-3 rounded-xl bg-surface-container active:scale-[0.99] transition-transform" data-name="阳光电源" data-code="300274.SZ" data-initial="阳">
          <div class="w-10 h-10 rounded-[10px] glass flex items-center justify-center flex-shrink-0">
            <span class="text-lg font-bold text-primary">阳</span>
          </div>
          <div class="flex-1 text-left">
            <p class="text-sm font-semibold text-on-surface">阳光电源</p>
            <p class="text-xs text-on-surface-variant mt-0.5">300274.SZ · 光伏逆变器</p>
          </div>
        </button>
        <button class="stock-option w-full flex items-center gap-3 p-3 rounded-xl bg-surface-container active:scale-[0.99] transition-transform" data-name="隆基绿能" data-code="601012.SH" data-initial="隆">
          <div class="w-10 h-10 rounded-[10px] glass flex items-center justify-center flex-shrink-0">
            <span class="text-lg font-bold text-primary">隆</span>
          </div>
          <div class="flex-1 text-left">
            <p class="text-sm font-semibold text-on-surface">隆基绿能</p>
            <p class="text-xs text-on-surface-variant mt-0.5">601012.SH · 光伏</p>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Sheet：图片操作 -->
  <div id="sheet-image" class="hidden fixed inset-0 z-50">
    <div id="sheet-image-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-surface rounded-t-2xl
                px-6 pt-5 pb-[calc(1.5rem+env(safe-area-inset-bottom))]">
      <div class="w-10 h-1 bg-on-surface-variant/30 rounded-full mx-auto mb-4"></div>
      <h3 id="sheet-image-title" class="text-sm font-medium text-on-surface-variant text-center mb-4 truncate">附件操作</h3>
      <div class="space-y-2">
        <button id="img-action-view" class="w-full flex items-center gap-3 p-4 rounded-xl bg-surface-container active:scale-[0.99] transition-transform">
          <i data-lucide="image" class="w-5 h-5 text-on-surface-variant"></i>
          <span class="text-sm font-medium text-on-surface">查看大图</span>
        </button>
        <button id="img-action-ai" class="w-full flex items-center gap-3 p-4 rounded-xl bg-surface-container active:scale-[0.99] transition-transform">
          <i data-lucide="sparkles" class="w-5 h-5 text-primary"></i>
          <span class="text-sm font-medium text-primary">AI 解读图片</span>
        </button>
        <button id="img-action-delete" class="w-full flex items-center gap-3 p-4 rounded-xl bg-error/10 active:scale-[0.99] transition-transform">
          <i data-lucide="trash-2" class="w-5 h-5 text-error"></i>
          <span class="text-sm font-medium text-error">删除图片</span>
        </button>
        <button id="img-action-cancel" class="w-full p-4 rounded-xl bg-surface-container-high active:scale-[0.99] transition-transform">
          <span class="text-sm font-medium text-on-surface-variant">取消</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Sheet：AI 解读结果预览（隐藏 demo） -->
  <div id="sheet-ai-result" class="hidden fixed inset-0 z-[60]">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
    <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 glass-strong rounded-2xl p-5">
      <div class="flex items-center gap-2 mb-3">
        <i data-lucide="sparkles" class="w-4 h-4 text-primary"></i>
        <h3 class="text-sm font-semibold text-on-surface">AI 解读完成</h3>
      </div>
      <p id="ai-result-text" class="text-[13px] text-on-surface leading-relaxed">
        图表显示宁德时代周线级别处于上升通道，MACD 金叉，成交量温和放大；下方支撑 175 元，上方阻力 220 元，止损位建议设置在 175 附近。
      </p>
      <div class="flex gap-2 mt-4">
        <button id="ai-result-cancel" class="flex-1 py-2.5 rounded-xl bg-surface-container text-on-surface text-sm font-medium">取消</button>
        <button id="ai-result-confirm" class="flex-1 py-2.5 rounded-xl bg-primary text-on-primary text-sm font-semibold glow-primary">插入正文</button>
      </div>
    </div>
  </div>

  <script>
    // ========== 导航辅助函数 ==========
    function navPush(route) {
      console.log(`[原型演示] PUSH 到: ${route}`);
      window.location.href = route;
    }
    function navReplace(route) {
      console.log(`[原型演示] REPLACE 为: ${route}`);
      window.location.replace(route);
    }
    function navReset(route) {
      console.log(`[原型演示] RESET 到: ${route}`);
      window.location.href = route;
    }
    function navBack() {
      console.log(`[原型演示] BACK 返回上一页`);
      if (window.history.length > 1) window.history.back();
      else window.location.href = 'stock.html';
    }

    $(function () {
      // ====== Header ======
      // 关闭：返回 stock.html
      $('#btn-close').on('click', function () {
        window.location.href = 'stock.html';
      });
      // 顶部保存
      $('#btn-header-save').on('click', function () {
        saveNote();
      });

      // ====== 1. 股票选择卡 ======
      $('#stock-card').on('click', function () {
        $('#sheet-stock').removeClass('hidden');
        lucide.createIcons();
      });
      $('#sheet-stock-backdrop, #sheet-stock-close').on('click', function () {
        $('#sheet-stock').addClass('hidden');
      });
      $('.stock-option').on('click', function () {
        const name = $(this).data('name');
        const code = $(this).data('code');
        const initial = $(this).data('initial');
        // 更新股票卡显示
        $('#stock-card').find('p').first().text(name);
        $('#stock-card').find('p').eq(1).text(code + ' · 已选');
        $('#stock-card').find('span').first().text(initial);
        $('#sheet-stock').addClass('hidden');
      });

      // ====== 2. 方向三选一 ======
      $('.dir-btn').on('click', function () {
        const dir = $(this).data('dir');
        // 重置所有
        $('.dir-btn').attr('aria-pressed', 'false')
          .removeClass('bg-primary-container/60')
          .find('span:last-child').removeClass('text-primary text-error text-warning').addClass('text-on-surface-variant');
        // 激活当前
        $(this).attr('aria-pressed', 'true').addClass('bg-primary-container/60');
        const colorMap = { bull: 'text-primary', bear: 'text-primary', neutral: 'text-primary' };
        $(this).find('span:last-child').removeClass('text-on-surface-variant').addClass(colorMap[dir]);
        // 简单交互：切换激活态已完成，复杂场景下应同步表单方向字段到 hidden input
        console.log(`[方向切换] 当前方向: ${dir}`);
      });

      // ====== 4. 标题字符计数 ======
      $('#input-title').on('input', function () {
        const len = $(this).val().length;
        $('#title-counter').text(`${len}/100`);
      });

      // ====== 5. 富文本工具栏（复杂交互，仅占位） ======
      // 加粗按钮 - 复杂交互：富文本编辑
      // 1. 获取 textarea 当前选区起始/结束位置
      // 2. 用 ** 包裹选区文本（markdown 语法）
      // 3. 替换原选区并重新聚焦
      // 4. 高亮当前按钮（toggle active 状态）
      $('#rt-bold').on('click', function () {
        $(this).toggleClass('active');
        console.log('[富文本] 加粗 - 需实现选区 markdown 包裹');
      });
      // 斜体 - 复杂交互：用 * 包裹选区
      $('#rt-italic').on('click', function () {
        $(this).toggleClass('active');
        console.log('[富文本] 斜体 - 需实现选区 * 包裹');
      });
      // 下划线 - 复杂交互：插入 <u> 标签或 markdown 扩展语法
      $('#rt-underline').on('click', function () {
        $(this).toggleClass('active');
        console.log('[富文本] 下划线 - 需实现选区标记');
      });
      // 无序列表 - 复杂交互：在光标行首插入 - 标记
      $('#rt-list').on('click', function () {
        console.log('[富文本] 无序列表 - 需实现在行首插入 - ');
      });
      // 有序列表 - 复杂交互：根据行号自动编号 1. 2. 3.
      $('#rt-list-ordered').on('click', function () {
        console.log('[富文本] 有序列表 - 需实现自动编号');
      });
      // 引用 - 复杂交互：在行首插入 > 标记
      $('#rt-quote').on('click', function () {
        console.log('[富文本] 引用 - 需实现在行首插入 > ');
      });
      // 插入链接 - 复杂交互：弹出输入框收集 URL，包裹选区为 [text](url)
      $('#rt-link').on('click', function () {
        console.log('[富文本] 链接 - 需弹窗收集 URL 并包裹选区');
      });
      // 插入图片 - 复杂交互：调起系统相册选择图片，上传 TOS 后插入 ![](url)
      $('#rt-image').on('click', function () {
        console.log('[富文本] 插入图片 - 需调起系统相册并上传');
      });

      // ====== 6. 图片附件交互 ======
      // 点击图片 → 弹出操作 sheet
      $('.attachment-item').on('click', function (e) {
        // 阻止删除按钮冒泡
        if ($(e.target).closest('.att-remove').length) return;
        const name = $(this).data('name') || '附件';
        $('#sheet-image-title').text(name);
        $('#sheet-image').removeClass('hidden');
        lucide.createIcons();
      });
      // 关闭图片 sheet
      $('#sheet-image-backdrop, #img-action-cancel').on('click', function () {
        $('#sheet-image').addClass('hidden');
      });
      // 查看大图 - 复杂交互：弹出全屏预览，支持双指缩放、左右滑动切换
      $('#img-action-view').on('click', function () {
        $('#sheet-image').addClass('hidden');
        console.log('[图片] 查看大图 - 需实现全屏预览组件');
      });
      // AI 解读 - 复杂交互：调用豆包多模态 ai/image-understand，弹窗显示解读结果
      $('#img-action-ai').on('click', function () {
        $('#sheet-image').addClass('hidden');
        $('#sheet-ai-result').removeClass('hidden');
        lucide.createIcons();
      });
      // 确认插入 AI 解读
      $('#ai-result-confirm').on('click', function () {
        const result = $('#ai-result-text').text();
        const content = $('#input-content');
        content.val((content.val() || '') + '\n\n[AI 解读] ' + result);
        $('#sheet-ai-result').addClass('hidden');
        console.log('[AI 解读] 已合并到正文');
      });
      $('#ai-result-cancel, #sheet-ai-result > div').first().on('click', function () {
        $('#sheet-ai-result').addClass('hidden');
      });
      // 删除图片
      $('#img-action-delete').on('click', function () {
        $('#sheet-image').addClass('hidden');
        // 简单交互：从 DOM 移除最后一张附件（demo）
        const items = $('.attachment-item');
        if (items.length > 0) {
          items.last().remove();
          // 更新计数
          const left = $('.attachment-item').length;
          $('h3:contains("附件")').siblings('span').text(`${left}/9`);
        }
      });
      // 删除按钮（缩略图右上角 ×）
      $('.att-remove').on('click', function (e) {
        e.stopPropagation();
        const item = $(this).closest('.attachment-item');
        item.css('transform', 'scale(0.8)').css('opacity', '0');
        setTimeout(function () {
          item.remove();
          const left = $('.attachment-item').length;
          $('.text-sm.font-semibold:contains("附件")').siblings('span').text(`${left}/9`);
        }, 200);
      });
      // 新增图片
      $('#btn-add-image').on('click', function () {
        // 复杂交互：调起系统相册/相机 → 上传 TOS → 写入 attachments 数组
        // 1. 调用 wx.chooseMedia / Taro.chooseMedia 唤起选择
        // 2. 上传至 TOS（先调 upload/sign 拿签名 URL）
        // 3. 上传完成后回填 URL 到附件列表 + 触发单图 AI 解读
        console.log('[附件] 唤起系统相册选择图片');
      });

      // ====== 7. AI 解读提示条"插入"按钮 ======
      $('#btn-ai-insert').on('click', function () {
        const aiText = '\n\n[AI 解读摘要]\n· K 线处于上升通道，MACD 金叉，量能温和放大\n· 关键支撑 175 元，阻力 220 元\n· 装机量柱状图显示 Q2 同比 +45%，拐点确认\n· 海外储能订单超预期，业绩弹性可期';
        const content = $('#input-content');
        content.val((content.val() || '') + aiText);
        // 隐藏提示条
        $(this).closest('.gradient-border').fadeOut(300, function () { $(this).remove(); });
        console.log('[AI 解读] 已批量插入到正文末尾');
      });

      // ====== 8. 标签与事件 ======
      // 移除已选标签
      $('.tag-selected').on('click', function (e) {
        e.stopPropagation();
        if ($(e.target).closest('svg').length || $(e.target).is('span.tag-selected')) {
          $(this).fadeOut(200, function () { $(this).remove(); });
        }
      });
      // 添加标签 - 复杂交互：弹出标签输入弹层
      // 1. 弹层包含输入框 + 已有标签推荐
      // 2. 输入回车提交，自动去重
      // 3. 最多 5 个标签
      $('#btn-add-tag').on('click', function () {
        console.log('[标签] 弹层输入新标签 - 需实现标签选择/创建弹层');
      });

      // ====== 9. 底部操作条 ======
      // 插入图片（底部条）
      $('#btn-insert-image').on('click', function () {
        // 复杂交互：调起系统相册，多选图片批量上传
        console.log('[底部] 插入图片 - 需实现系统相册多选 + 批量上传');
      });
      // 语音速记
      $('#btn-voice').on('click', function () {
        // 复杂交互：
        // 1. 调起 Taro.getRecorderManager 开始录音
        // 2. 录音中显示波形动画
        // 3. 松开发送 → 上传音频 → 调豆包 ASR 转写
        // 4. 转写结果追加到正文
        console.log('[底部] 语音速记 - 需实现录音 + ASR 转写');
      });
      // 保存观点
      $('#btn-save').on('click', function () {
        saveNote();
      });

      // ====== 价格输入校验（简单） ======
      $('input[id^="input-"]').on('input', function () {
        if ($(this).attr('inputmode') === 'decimal') {
          // 仅允许数字 + 一个小数点
          let v = $(this).val().replace(/[^\d.]/g, '');
          const parts = v.split('.');
          if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
          $(this).val(v);
        }
      });
    });

    // ========== 保存观点（复杂交互） ==========
    // 复杂交互 - 完整实现步骤：
    // 1. 收集表单数据：stock_code / direction / entry_price / target_price / stop_price / title / content / tags / event / source / attachments
    // 2. 前端校验：
    //    - title 必填且 ≤100 字
    //    - 三个价格必须为正数，且止损 < 入场 < 目标（看多）/ 入场 < 止损 < 目标（看空）
    //    - 至少 1 个标签
    // 3. 调用 notes/create 或 notes/update（根据 URL ?note_id 判定）
    // 4. 成功 → Toast「观点已保存」→ navBack()
    // 5. 失败 → Toast 错误信息，停留当前页
    function saveNote() {
      const data = {
        stock: $('#stock-card p').first().text(),
        direction: $('.dir-btn[aria-pressed="true"]').data('dir'),
        entry: $('#input-entry').val(),
        target: $('#input-target').val(),
        stop: $('#input-stop').val(),
        title: $('#input-title').val(),
        content: $('#input-content').val(),
        tags: $('.tag-selected').map(function () { return $(this).text().trim(); }).get(),
        event: $('#input-event').val(),
        source: $('#input-source').val(),
        attachments: $('.attachment-item').length
      };
      console.log('[保存观点] 表单数据:', data);
      // 演示：直接返回
      if (!data.title) {
        alert('请输入观点标题');
        return;
      }
      // 实际实现应调 API，成功后跳回详情页
      // navBack();
      // 这里仅演示导航
      console.log('[保存观点] 成功，跳转回 stock.html');
      window.location.href = 'stock.html';
    }
  </script>

  <script>lucide.createIcons();</script>
</body>
