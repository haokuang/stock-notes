services:
  server:
    platform: linux/amd64
    image: codex-docker-runtime-server:amd64
    build:
      context: .
      dockerfile: Dockerfile
      target: server-runtime
      platforms:
        - linux/amd64
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3000/api/health')
          .then((response) => { if (!response.ok) process.exit(1) })
          .catch(() => process.exit(1))
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5

  web:
    platform: linux/amd64
    image: codex-docker-runtime-web:amd64
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
      platforms:
        - linux/amd64
      args:
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped
    init: true
